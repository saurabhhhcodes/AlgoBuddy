name : Test Platform

on:
    pull_request:
        branches:
            - main

jobs:
    test:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 22
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test

            - name: Build Next.js
              run: npm run build

    validate-backend-pom:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: 21
                distribution: temurin
                cache: maven

            - name: Validate Maven POM
              run: bash ./mvnw validate --batch-mode